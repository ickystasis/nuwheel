<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheel of Doom(b)</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left Column -->
            <div class="left-column">
                <div class="add-section">
                    <button id="winnersBtn" class="btn btn-icon" title="Previous Winners">🏆</button>
                    <button id="statsBtn" class="btn btn-icon" title="Stats">📊</button>
                    <span style="flex:1"></span>
                    <button id="addWatcherBtn" class="btn btn-icon" title="Select Victims">👤</button>
                    <button id="adminBtn" class="btn btn-icon hidden" title="Admin">🔧</button>
                    <button id="lockBtn" class="btn btn-icon" title="Unlock settings">🔒</button>
                </div>
                <div class="list-panel" id="watchersPanel">
                    <div class="watcher-panel-header">
                        <h2>Victims</h2>
                        <label class="main-bypass">
                            <input type="checkbox" id="bypassChecks" />
                            Point Override
                        </label>
                    </div>
                    <div id="watchersContainer"></div>
                    <p id="emptyMsg" class="empty-msg">No Victims yet! ✨</p>
                </div>
            </div>

            <!-- Wheel Panel -->
            <div class="wheel-panel">
                <div class="wheel-wrapper">
                    <div class="pointer">▼</div>
                    <canvas id="wheelCanvas" width="1000" height="1000"></canvas>
                </div>

                
            </div>

            <!-- Side Panel -->
            <div class="side-panel" id="sidePanel">
                <div class="wheel-info" id="wheelInfo">
                    <span id="totalWeight">Total weight: 0</span>
                </div>
                <div class="action-group">
                    <div class="action-row" id="actionRow">
                        <button id="shuffleBtn" class="btn btn-shuffle">🔀 Shuffle Wheel</button>
                        <button id="abortBtn" class="btn btn-abort action-btn faded" disabled>🚫 Abort Session</button>
                        <button id="verdictBtn" class="btn btn-verdict action-btn faded" disabled>⚖️ Render Verdict</button>
                        <button id="spinBtn" class="btn btn-accept action-btn faded" disabled>✓ Accept ✓</button>
                    </div>
                    <div id="winnerDisplay" class="winner-display hidden">
                        <div id="winnerText" class="winner-text"></div>
                        <div id="winnerDetails" class="winner-details"></div>
                    </div>
                    <div id="returnMsg" class="return-msg hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Select Participants Modal -->
    <div id="participantsModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>👤 Select Victims</h2>
                <button id="participantsCloseBtn" class="modal-close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div id="allWatchersList"></div>
            </div>
            <div class="modal-footer">
                <button id="startMovieNightBtn" class="btn btn-start">🎬 Start Movie Night!</button>
            </div>
        </div>
    </div>

    <!-- Previous Winners Modal -->
    <div id="winnersModal" class="modal-overlay hidden">
        <div class="modal-content" style="position:relative;max-width:760px">
            <div class="modal-header">
                <h2>🏆 Previous Winners</h2>
                <button id="modalCloseBtn" class="modal-close-btn">✕</button>
            </div>
            <div id="winnersFilterBar">
                <button id="filterResetBtn" class="btn btn-filter-reset">✕ Reset</button>
                <select id="filterJudgement">
                    <option value="all">All</option>
                    <option value="punish">Punished</option>
                    <option value="not-punish">Not Punished</option>
                </select>
                <select id="filterWeight">
                    <option value="all">All Weights</option>
                    <option value="1">True 1-Weight</option>
                </select>
                <select id="filterProposer">
                    <option value="all">All Proposers</option>
                </select>
                <input type="text" id="filterSearch" placeholder="🔍 Search title..." />
            </div>
            <div class="modal-body" id="winnersList">
                <p class="empty-msg">No winners yet! Spin the wheel~ ✨</p>
            </div>
            <div id="winnersTooltip" class="pts-tooltip hidden"></div>
            <div class="modal-footer" style="justify-content:space-between;align-items:center;gap:0.75rem;flex-wrap:wrap">
            </div>
        </div>
    </div>

    <!-- Stats & Debt Matrix Modal -->
    <div id="debtMatrixModal" class="modal-overlay hidden">
        <div class="panel-stack">
            <!-- Debt Matrix Panel (completely independent) -->
            <div id="debtMatrixPanel" class="floating-panel">
                <div class="panel-header">
                    <h2>💳 Debt Matrix</h2>
                    <button id="debtMatrixCloseBtn" class="modal-close-btn">✕</button>
                </div>
                <div class="panel-body" id="debtMatrixPanelBody">
                    <div id="debtMatrixSummary" style="margin-bottom:0.5rem;font-size:0.85rem;color:#aaa"></div>
                    <table id="debtMatrixTable" class="debt-matrix-table">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Victim Stats Panel (completely independent) -->
            <div id="statsPanel" class="floating-panel">
                <div class="panel-header">
                    <h2>📊 Victim Stats</h2>
                </div>
                <div class="panel-body" id="statsPanelBody">
                    <div id="statsBody">
                        <p class="empty-msg" style="padding:1rem">Loading stats…</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="adminModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔧 Admin Panel</h2>
                <button id="adminCloseBtn" class="modal-close-btn">✕</button>
            </div>
            <div class="modal-body">
                    <div class="new-watcher-row" style="margin-bottom:1rem">
                        <input type="text" id="adminNewName" placeholder="Victim name..." maxlength="100" />
                        <input type="color" id="adminColorInput" value="#4ECDC4" />
                        <button id="adminAddBtn" class="btn btn-small btn-add">➕ Add</button>
                    </div>
                <div id="adminWatchersList"></div>
                <hr style="border-color:#2a2a3e;margin:1rem 0">
                <div class="new-watcher-row">
                    <span style="color:#e0e0e0;font-size:0.9rem;flex:1">Wheel Center Image</span>
                    <label for="adminCenterImageInput" class="btn btn-small btn-add" style="cursor:pointer">🖼️ Change</label>
                    <input type="file" id="adminCenterImageInput" accept="image/*" style="display:none" />
                </div>
                <hr style="border-color:#2a2a3e;margin:1rem 0">
                <div style="color:#6a6a7e;font-size:0.8rem;text-align:center" id="adminVersionDisplay"></div>
            </div>
        </div>
    </div>

    <!-- Retro Vote Modal -->
    <div id="retroVoteModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🗳️ Retro Vote</h2>
                <button id="retroVoteCloseBtn" class="modal-close-btn">✕</button>
            </div>
            <div class="modal-body" id="retroVoteBody">
                <p class="empty-msg">No participant data available for this entry.</p>
            </div>
            <div class="modal-footer">
                <button id="retroVoteRecordBtn" class="btn btn-verdict">📝 Record Votes</button>
            </div>
        </div>
    </div>

    <!-- Password Prompt Modal -->
    <div id="passwordModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width:360px">
            <div class="modal-header">
                <h2>🔒 Admin Password</h2>
            </div>
            <div class="modal-body" style="text-align:center;padding:1.5rem">
                <input type="password" id="passwordInput"
                       placeholder="Enter password..."
                       style="width:100%;padding:0.7rem 1rem;border:2px solid #2a2a3e;border-radius:8px;background:#1a1a2e;color:#e0e0e0;font-size:1rem;outline:none;text-align:center;"
                       autofocus />
            </div>
            <div class="modal-footer" style="display:flex;gap:0.5rem;justify-content:flex-end">
                <button id="passwordCancelBtn" class="btn btn-small" style="background:#3a3a52;color:#e0e0e0">Cancel</button>
                <button id="passwordSubmitBtn" class="btn btn-small btn-add">Unlock</button>
            </div>
        </div>
    </div>

    <style>
        .retro-vote-btn {
            background: none;
            border: 1px solid #7c3aed;
            border-radius: 8px;
            padding: 0.25rem 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            line-height: 1.4;
            color: #a78bfa;
            white-space: nowrap;
        }
        .panel-stack { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 2rem; max-height: 95vh; overflow-y: auto; width: 100%; }
        .floating-panel { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; }
        .floating-panel .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.2rem; border-bottom: 1px solid #2a2a3e; }
        .floating-panel .panel-header h2 { margin: 0; font-size: 1rem; color: #e0e0e0; }
        .floating-panel .panel-body { overflow: auto; padding: 0.8rem; }
        #debtMatrixPanel { align-self: center; }
        #debtMatrixPanel .panel-body { overflow-x: auto; }
        #statsPanel { align-self: center; min-width: 600px; max-width: 95vw; }
        #statsPanel .panel-body { overflow-x: auto; max-height: 50vh; }
        .debt-matrix-table td.cell-diagonal { background: #0f0f1a; }
        .debt-matrix-content .stats-table { width: 100%; min-width: 600px; }
        .debt-matrix-table { border-collapse: collapse; width: auto; font-size: 0.7rem; }
        .debt-matrix-table th, .debt-matrix-table td { border: 1px solid #2a2a3e; padding: 0.15rem 0.3rem; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .debt-matrix-table th { background: #1a1a2e; color: #ffd93d; font-weight: 600; }
        .debt-matrix-table th.row-header { background: #16162a; color: #e0e0e0; }
        .debt-matrix-table td:first-child,
        .debt-matrix-table th:first-child { background: #16162a; font-weight: 500; }
        .debt-matrix-table td.cell-zero { color: #555; }
        .debt-matrix-table td.cell-positive { color: #e0e0e0; font-weight: 600; }
        .debt-matrix-table td.cell-editable { cursor: pointer; }
        .debt-matrix-table td.cell-editable:hover { background: #2a2a3e; }
        .debt-matrix-table td.cell-diagonal { background: #0f0f1a; }
        .debt-matrix-table td input { width: 100%; box-sizing: border-box; background: #0f0f1a; border: 1px solid #3a3a52; color: #e0e0e0; padding: 0.1rem; border-radius: 3px; text-align: center; font-size: 0.7rem; }
        .debt-matrix-table td input:focus { outline: none; border-color: #6bcb77; }
        .debt-matrix-modal-body { padding: 0.3rem !important; }
        .pts-tooltip {
            position: fixed;
            background: #0f0f1a;
            border: 1px solid #3a3a52;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.975rem;
            line-height: 1.5;
            white-space: pre;
            z-index: 99999;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .pts-tooltip .pos { color: #6bcb77; }
        .pts-tooltip .neg { color: #ff6b6b; }
        .pts-tooltip .summary { color: #ffd93d; border-top: 1px solid #2a2a3e; margin-top: 0.2rem; padding-top: 0.2rem; }
        .pts-tooltip.hidden { display: none; }
        #winnersTooltip { position: absolute; z-index: 99999; }
        #debtMatrixSummary { display: none; }
        .retro-vote-btn:hover {
            background: rgba(124, 58, 237, 0.15);
            border-color: #a78bfa;
            transform: scale(1.05);
        }
        .winner-entry-gold { background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,200,0,0.06)); border: 1px solid rgba(255,215,0,0.3) !important; }
        .streak-badge-sm { display:inline-flex; padding:0.1rem 0.4rem; border-radius:999px; background:#5a2a2a; color:#ff6b6b; font-size:0.75rem; font-weight:700; }
        .vote-chip { display:inline-flex; padding:0.05rem 0.35rem; border-radius:999px; font-size:0.75rem; font-weight:600; border:1px solid transparent; }
        .vote-chip-pass { background:rgba(46,160,67,0.15); color:#6bcb77; border-color:rgba(46,160,67,0.3); }
        .vote-chip-punish { background:rgba(218,54,51,0.15); color:#ff6b6b; border-color:rgba(218,54,51,0.3); }
        .vote-chip-na { background:rgba(255,215,0,0.1); color:#ffd700; border-color:rgba(255,215,0,0.25); }
        .vote-chip-aborted { background:rgba(160,160,192,0.12); color:#a0a0c0; border-color:rgba(160,160,192,0.25); }
        .editable-field { cursor:pointer; border-bottom:1px dashed rgba(255,255,255,0.15); padding:0 0.1rem; }
        .editable-field:hover { border-bottom-color:#6bcb77; }
        .editable-input { background:#0f0f1a; border:1px solid #3a3a52; color:#e0e0e0; padding:0.1rem 0.3rem; border-radius:4px; font-size:0.85rem; width:auto; min-width:3rem; }
        .editable-input:focus { outline:none; border-color:#6bcb77; }
    </style>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <div id="ptsTooltip" class="pts-tooltip hidden"></div>
    <script src="app.js?v=37"></script>
</body>
</html>
