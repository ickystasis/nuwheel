# ============================================================
#  Docker Compose — Wheel of Doom(b)
#  Single container, mapped data volume, port 9642
# ============================================================

services:
  wheel:
    build: .
    container_name: wheel-of-doomb
    ports:
      - "9642:9642"
    volumes:
      # Persist SQLite database on host
      - wheel-data:/data
      # OR: uncomment below to use a local directory instead
      # - ./data:/data
      # Mount music/cheers directories so you can add .wav files without rebuilding
      # - ./app/static/music:/app/app/static/music
      # - ./app/static/cheers:/app/app/static/cheers
    restart: unless-stopped
    environment:
      - DB_DIR=/data
      # ⚠️ CHANGE THIS before deploying to a shared network
      - ADMIN_PASSWORD=setadminpass

volumes:
  wheel-data:
